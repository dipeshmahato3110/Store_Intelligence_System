<!DOCTYPE html>
<html>

<head>

    <title>
        Store Intelligence Dashboard
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

    <div class="container mt-4">

        <h1 class="mb-4"> Store Intelligence Dashboard </h1> <!-- KPI CARDS -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card shadow">
                    <div class="card-body">
                        <h5>Revenue</h5>
                        <h2 id="revenue"> Loading... </h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow">
                    <div class="card-body">
                        <h5>Orders</h5>
                        <h2 id="orders"> Loading... </h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow">
                    <div class="card-body">
                        <h5>Visitors</h5>
                        <h2 id="visitors"> Loading... </h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow">
                    <div class="card-body">
                        <h5>Conversion %</h5>
                        <h2 id="conversion"> Loading... </h2>
                    </div>
                </div>
            </div>
        </div> <!-- BRAND REVENUE CHART -->
        <div class="card shadow mb-4">
            <div class="card-body">
                <h3> Top Brand Revenue </h3> <canvas id="brandChart"></canvas>
            </div>
        </div> <!-- ZONE PERFORMANCE CHART -->
        <div class="card shadow mb-4">
            <div class="card-body">
                <h3> Zone Performance </h3> <canvas id="zoneChart"></canvas>
            </div>
        </div> <!-- TOP BRANDS TABLE -->
        <div class="card shadow mb-4">
            <div class="card-body">
                <h3> Top Brands </h3>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Brand</th>
                            <th>Revenue</th>
                            <th>Purchases</th>
                        </tr>
                    </thead>
                    <tbody id="brandTable"> </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>

        fetch('/revenue')
            .then(res => res.json())
            .then(data => {

                document.getElementById(
                    'revenue'
                ).innerText =
                    '₹' + data.total_revenue

                document.getElementById(
                    'orders'
                ).innerText =
                    data.total_orders
            })

        fetch('/conversion')
            .then(res => res.json())
            .then(data => {

                document.getElementById(
                    'visitors'
                ).innerText =
                    data.total_visitors

                document.getElementById(
                    'conversion'
                ).innerText =
                    data.conversion_rate + '%'
            })

        fetch('/brands')
            .then(res => res.json())
            .then(data => {

                const labels =
                    Object.keys(data)

                const values =
                    Object.values(data)

                new Chart(
                    document.getElementById(
                        'brandChart'
                    ),
                    {
                        type: 'bar',

                        data: {

                            labels: labels,

                            datasets: [
                                {
                                    label:
                                        'Brand Revenue',

                                    data: values
                                }
                            ]
                        }
                    }
                )

            })

        //             }
        //         )

        //     })

        // =====================
        // TOP BRANDS TABLE
        // =====================

        fetch('/top-brands')
            .then(res => res.json())
            .then(data => {

                const table =
                    document.getElementById(
                        'brandTable'
                    )

                table.innerHTML = ""

                data.forEach(row => {

                    table.innerHTML += `
                    <tr>
                        <td>${row.brand}</td>
                        <td>₹${row.revenue}</td>
                        <td>${row.purchases}</td>
                    </tr>
                    `
                })

            })

        fetch('/zone-performance-v2')
            .then(res => res.json())
            .then(data => {

                const labels = Object.keys(data)

                const visitors = labels.map(
                    zone => data[zone].visitors
                )

                new Chart(
                    document.getElementById(
                        'zoneChart'
                    ),
                    {
                        type: 'bar',

                        data: {
                            labels: labels,

                            datasets: [
                                {
                                    label: 'Visitors',

                                    data: visitors
                                }
                            ]
                        }
                    }
                )

            })
